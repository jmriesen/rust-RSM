name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
          fetch-depth: 0
    - uses: actions/cache@v4
      with:
       path: |
         ~/.rustup
         ~/.cargo
         ./target
       key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    - name: install tree-sitter
      run: cargo install tree-sitter-cli --version 0.22.6  --locked
    - name: install cargo-mutants
      run: cargo install cargo-mutants  --version 27.1.0 --locked
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose
    - name: Generate diff
      run: |
            git branch -av
            git diff origin/${{ github.base_ref }}.. | tee git.diff

    - name: Mutants
      run: |
          # using tee to echo to both file and standered out. Or with true to insure first command never fails
            cargo mutants --no-shuffle -vV --in-diff git.diff 2>&1 | tee mutants.log || true
            if grep -q "MISSED" mutants.log; then
              echo "❌ Mutants missed!"
              exit 1
            fi
